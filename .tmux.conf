# Set prefix to Ctrl+a
unbind C-a
set -g prefix C-b
bind C-b send-prefix

# Set 256 color support
set -g default-terminal "screen-256color"

# Enable mouse support
set -g mouse on

# Rebind r to source config file
unbind r
bind r source-file ~/.tmux.conf

# Vim-style pane navigation
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# Allow quick repeat of keys after prefix
set-option -g repeat-time 1000

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vim Navigation in tmux
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions every 15 minutes

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

# Vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Slow down mouse scroll speed — both when entering copy mode and while in it
bind -T root WheelUpPane if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -X -N 2 scroll-up"
bind -T root WheelDownPane if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 2 scroll-down

# Open new panes/windows in the current pane's directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
